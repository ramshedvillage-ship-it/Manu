<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 REVO FIXER - Crazy Time Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;background:linear-gradient(135deg,#0f0f23 0%,#1a1a2e 50%,#16213e 100%);color:#fff;min-height:100vh;overflow-x:hidden;position:relative;}
        .particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
        .particle{position:absolute;background:linear-gradient(45deg,#ff6b6b,#4ecdc4,#45b7d1,#96ceb4);border-radius:50%;animation:float 6s infinite linear;}
        @keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:1;}100%{transform:translateY(-100px) rotate(360deg);opacity:0;}}
        .container{max-width:400px;margin:0 auto;padding:20px;position:relative;z-index:10;padding-bottom: 100px;}
        .header{position:relative;text-align:center;margin-bottom:20px;}
        .logo{font-size:28px;font-weight:800;background:linear-gradient(45deg,#ff6b6b,#4ecdc4,#45b7d1);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
        .subtitle{font-size:14px;color:#a0a0a0;letter-spacing:1px;}
        
        .status-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(90deg,rgba(255,107,107,0.1),rgba(78,205,196,0.1));border-radius:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(20px);}
        .status-dot{width:10px;height:10px;border-radius:50%;background:#4ecdc4;box-shadow:0 0 20px #4ecdc4;animation:pulse 2s infinite;}
        .timer-badge {background: rgba(255,107,107,0.2); color: #ff6b6b; padding: 4px 10px; border-radius: 10px; font-family: monospace; font-weight: bold; font-size: 14px; border: 1px solid rgba(255,107,107,0.3);}

        .signal-card{background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));backdrop-filter:blur(25px);border-radius:24px;padding:25px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.15);box-shadow:0 20px 40px rgba(0,0,0,0.3);text-align: center;}
        .prediction-header{display:flex;flex-direction: column;align-items:center;margin-bottom:20px;}
        .signal-icon{font-size:54px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(78,205,196,0.5));}
        .signal-text{font-size:36px;font-weight:800;margin:0; color: #fff; text-shadow: 0 0 20px rgba(78,205,196,0.5);}
        
        .confidence-container {margin: 15px 0;}
        .confidence-label {font-size: 11px; color: #a0a0a0; margin-bottom: 5px; display: flex; justify-content: space-between;}
        .confidence-bar{background:rgba(255,255,255,0.1);height:8px;border-radius:4px;overflow:hidden;}
        .confidence-fill{height:100%;border-radius:4px;transition:all 1.5s ease;background:linear-gradient(90deg,#ff6b6b,#4ecdc4);}

        .action-buttons {display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0;}
        .btn-main {border: none; padding: 14px; border-radius: 16px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-predict {background: linear-gradient(45deg, #4ecdc4, #45b7d1); color: #0f0f23; box-shadow: 0 10px 20px rgba(78,205,196,0.3);}
        .btn-refresh {background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);}
        .btn-main:active {transform: scale(0.95);}

        .ai-consensus{margin-top:20px;padding:15px;background:rgba(0,0,0,0.2);border-radius:16px;border:1px solid rgba(255,255,255,0.1);}
        .ai-votes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;}
        .ai-engine{padding:8px;background:rgba(255,255,255,0.05);border-radius:12px;font-size: 10px; text-align: center;}
        .ai-name{color:#a0a0a0;margin-bottom: 4px; display: block;}
        .ai-val{font-weight: 800; color: #4ecdc4;}

        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:20px;}
        .stat-item{background:rgba(255,255,255,0.05);padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);}
        .stat-value{font-size:18px;font-weight:800;color:#4ecdc4;}
        .stat-label{font-size:10px;color:#a0a0a0;}

        .bottom-nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;background:rgba(255,255,255,0.1);backdrop-filter:blur(25px);border-radius:25px;padding:8px;width: 90%; max-width: 360px; justify-content: space-around; border: 1px solid rgba(255,255,255,0.1);}
        .nav-btn{padding:10px;border-radius:18px;display:flex;flex-direction:column;align-items:center;font-size:10px;color:#a0a0a0;background:transparent;border:none;flex:1;cursor:pointer;}
        .nav-btn.active{color:#4ecdc4;background:rgba(78,205,196,0.1);}

        .toast{position:fixed;top:20px;right:20px;background:linear-gradient(45deg,#4ecdc4,#45b7d1);color:#fff;padding:12px 20px;border-radius:15px;transform:translateX(450px);transition:all 0.4s ease;z-index:1000; font-weight: 600;}
        .toast.show{transform:translateX(0);}

        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
        .loading { width: 14px; height: 14px; border: 2px solid #000; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="header">
            <div class="logo">🔮 REVO FIXER</div>
            <div class="subtitle">AI CRAZY TIME ANALYSIS</div>
        </div>

        <div class="status-bar">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div class="status-dot"></div>
                <div class="status-text" id="statusText">Connecting...</div>
            </div>
            <div class="timer-badge" id="timer">00:60</div>
        </div>

        <div class="signal-card" id="mainCard">
            <div class="prediction-header">
                <div class="signal-icon" id="signalIcon">⏳</div>
                <h2 class="signal-text" id="signalText">READY</h2>
            </div>
            
            <div class="confidence-container">
                <div class="confidence-label"><span>AI CONFIDENCE</span><span id="confidencePct">0%</span></div>
                <div class="confidence-bar"><div class="confidence-fill" id="confidenceFill" style="width:0%"></div></div>
            </div>

            <div id="reasonText" style="font-size:12px;color:#a0a0a0;margin-top:10px;">Waiting for scan...</div>
            
            <div class="action-buttons">
                <button class="btn-main btn-predict" id="predictBtn" onclick="fetchPrediction()">
                    <i class="bi bi-cpu"></i> PREDICT
                </button>
                <button class="btn-main btn-refresh" onclick="location.reload()">
                    <i class="bi bi-arrow-repeat"></i> RELOAD
                </button>
            </div>

            <div class="ai-consensus">
                <div style="font-size:10px;color:#4ecdc4;font-weight:800;text-transform:uppercase;">AI Consensus</div>
                <div class="ai-votes" id="aiVotes">
                    <div class="ai-engine"><span class="ai-name">GPT</span><span class="ai-val" id="voteGpt">-</span></div>
                    <div class="ai-engine"><span class="ai-name">GEMINI</span><span class="ai-val" id="voteGem">-</span></div>
                    <div class="ai-engine"><span class="ai-name">FUSION</span><span class="ai-val" id="voteFus">-</span></div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-item"><div class="stat-value" id="statAcc">94%</div><div class="stat-label">AI Accuracy</div></div>
                <div class="stat-item"><div class="stat-value" id="statStreak">3</div><div class="stat-label">Win Streak</div></div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn active"><i class="bi bi-lightning-charge-fill" style="font-size:20px;"></i><div>SIGNAL</div></button>
            <button class="nav-btn" onclick="showToast('Scanning live patterns...')"><i class="bi bi-shield-lock-fill" style="font-size:20px;"></i><div>HACK</div></button>
            <button class="nav-btn" onclick="showToast('Version: 4.5.1')"><i class="bi bi-gear-fill" style="font-size:20px;"></i><div>SETUP</div></button>
        </div>
    </div>

    <div class="toast" id="toast"><div id="toastText"></div></div>

    <script>
        let timerSeconds = 60;
        let timerInterval;

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.width = p.style.height = (Math.random() * 3 + 2) + 'px';
                container.appendChild(p);
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastText').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerSeconds = 60;
            timerInterval = setInterval(() => {
                timerSeconds--;
                document.getElementById('timer').textContent = `00:${timerSeconds < 10 ? '0' + timerSeconds : timerSeconds}`;
                if (timerSeconds <= 0) fetchPrediction();
            }, 1000);
        }

        async function fetchPrediction() {
            const btn = document.getElementById('predictBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>';
            
            try {
                const res = await fetch('/api/predict');
                const data = await res.json();
                
                const icons = { '1': '①', '2': '②', '5': '⑤', '10': '⑩', 'Pachinko': '🎰', 'CashHunt': '🎯', 'CoinFlip': '🪙', 'CrazyTime': '🎡', 'CrazyBonus': '🎡' };
                
                document.getElementById('signalIcon').textContent = icons[data.prediction] || '💎';
                document.getElementById('signalText').textContent = data.prediction.toUpperCase();
                document.getElementById('confidenceFill').style.width = data.confidence + '%';
                document.getElementById('confidencePct').textContent = data.confidence + '%';
                document.getElementById('reasonText').textContent = data.reason;
                
                document.getElementById('voteGpt').textContent = data.votes?.gpt || '-';
                document.getElementById('voteGem').textContent = data.votes?.gemini || '-';
                document.getElementById('voteFus').textContent = data.votes?.fusion || '-';
                
                document.getElementById('statAcc').textContent = (data.stats?.accuracy || 94) + '%';
                document.getElementById('statStreak').textContent = data.stats?.streak || '3';
                
                showToast(`New Signal: ${data.prediction}`);
            } catch (e) {
                showToast("System busy - retrying...");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-cpu"></i> PREDICT';
                startTimer();
            }
        }

        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('statusText').textContent = `System: ${data.engines} Engines Active`;
            } catch (e) {
                document.getElementById('statusText').textContent = 'System Offline';
            }
        }

        window.onload = () => {
            createParticles();
            checkStatus();
            fetchPrediction();
        };
    </script>
</body>
</html>
